    document.querySelectorAll(".hatiralar-content img").forEach((box1) => {
      box1.onclick = () => {
        document.querySelector(".zoom-hatiralar").style.display = "block";
        document.querySelector(".zoom-hatiralar img").src =
          box1.getAttribute("src");
      };
    });
    document.querySelector(".zoom-hatiralar span").onclick = () => {
      document.querySelector(".zoom-hatiralar").style.display = "none";
    };
